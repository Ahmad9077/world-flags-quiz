<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="A premium interactive world flag quiz with 15-question sessions and smart country distractors.">
    <title>World Flags Quiz</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <div class="ambient ambient-a" aria-hidden="true"></div>
    <div class="ambient ambient-b" aria-hidden="true"></div>

    <main class="app-shell">
      <header class="hero">
        <div>
          <p class="eyebrow">World flags challenge</p>
          <h1>Can you spot the country from the flag?</h1>
          <p class="hero-copy">A 15-question quiz with close, region-aware choices and instant answer feedback.</p>
        </div>
        <div class="hero-stats" aria-label="Quiz settings">
          <span>196 countries</span>
          <span>15 questions</span>
          <span>4 choices</span>
        </div>
      </header>

      <section id="quiz-card" class="quiz-card" aria-live="polite">
        <div class="quiz-topline">
          <div>
            <p id="question-label" class="question-label">Question 1 of 15</p>
            <h2 id="quiz-heading">Name this flag</h2>
          </div>
          <div class="score-pill" aria-label="Current score">
            <span id="score-value">0</span>
            <span>/ 15</span>
          </div>
        </div>

        <div class="progress-shell" aria-label="Quiz progress">
          <div id="progress-bar" class="progress-bar"></div>
        </div>

        <div class="question-stage">
          <figure class="flag-frame">
            <img id="flag-image" src="" alt="">
          </figure>
          <div id="options" class="options-grid" role="group" aria-label="Answer options"></div>
        </div>

        <div id="feedback" class="feedback" hidden></div>

        <div class="actions-row">
          <button id="restart-button" class="ghost-button" type="button">Restart</button>
          <button id="next-button" class="primary-button" type="button" disabled>Choose an answer</button>
        </div>
      </section>

      <section id="results-card" class="results-card" hidden>
        <p class="eyebrow">Final result</p>
        <h2 id="result-title">Score</h2>
        <p id="result-message" class="result-message"></p>
        <div class="result-score">
          <span id="final-score">0</span>
          <small id="final-percent">0%</small>
        </div>
        <div class="result-actions">
          <button id="play-again-button" class="primary-button" type="button">Play Again</button>
        </div>
        <div class="review-wrap">
          <h3>Review Answers</h3>
          <div id="review-list" class="review-list"></div>
        </div>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
